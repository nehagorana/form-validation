<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>✈ Travel Form</h2>

    <form id="form">
         <label for="title">Prefix:</label>

        <select required>
            <option value="">Prefix</option>
            <option>Mr</option>
            <option>Ms</option>
            <option>Mrs</option>
        </select><br>
        <label for="fname">First Name:</label>

        <input type="text" placeholder="First Name: " required><br>
            <label for=lname">Last Name:</label>


        <input type="text" placeholder="Last Name: " required><br>
        <label for="username">Username:</label>

        <input type="text" placeholder="Username" required><br>
        <label for=""> Gender:</label>


        <select required>
            <option value="">Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select><br>
        <label for="dob">DOB:</label>

        <input type="date" id="dob" required><br>
                <label for="age">Age:</label>

        <input type="number" id="age" placeholder="Age" readonly><br>
                <label for="phone">Contact Number:</label>

        <input type="tel" id="phone" placeholder="Contact Number" required><br>
        <small id="phoneError"></small>
                <label for="email">Email Id:</label>

        <input type="email" placeholder="Email" required><br>
        <label for="pass">Password:</label>

        <input type="password" id="password" placeholder="Password" required>
        <small id="strength"></small><br>
                <label for="conpass">Confirm Password:</label><br>

        <input type="password" id="confirm" placeholder="Confirm Password" required>
        <small id="match"></small>

        <input type="text" placeholder="Departure City" required>
        <input type="text" placeholder="Destination" required>

        <input type="date" id="departure" required>
        <input type="date" id="return" required>

        <button type="submit">Book</button>

    </form>
</div>

<script src="work.js"></script>
</body>
</html>
