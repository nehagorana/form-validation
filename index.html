<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>✈ Travel Form</h2>

    <form id="form">

        <select required>
            <option value="">Prefix</option>
            <option>Mr</option>
            <option>Ms</option>
            <option>Mrs</option>
        </select>

        <input type="text" placeholder="First Name" required>
        <input type="text" placeholder="Last Name" required>

        <input type="text" placeholder="Username" required>

        <select required>
            <option value="">Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <input type="date" id="dob" required>
        <input type="number" id="age" placeholder="Age" readonly>

        <input type="tel" id="phone" placeholder="Contact Number" required>
        <small id="phoneError"></small>

        <input type="email" placeholder="Email" required>

        <input type="password" id="password" placeholder="Password" required>
        <small id="strength"></small>

        <input type="password" id="confirm" placeholder="Confirm Password" required>
        <small id="match"></small>

        <input type="text" placeholder="Departure City" required>
        <input type="text" placeholder="Destination" required>

        <input type="date" id="departure" required>
        <input type="date" id="return" required>

        <button type="submit">Book</button>

    </form>
</div>

<script src="work.js"></script>
</body>
</html>
